name: Release Plugin

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to build or repair
        required: true
        default: v0.1.15

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            ext: so
          - goos: linux
            goarch: arm64
            runner: ubuntu-24.04-arm
            ext: so
          - goos: darwin
            goarch: arm64
            runner: macos-15
            ext: dylib
          - goos: windows
            goarch: amd64
            runner: windows-latest
            ext: dll

    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${INPUT_TAG}"
          fi
          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "invalid release tag: ${tag}" >&2
            exit 1
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Checkout release tag
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22.x"
          cache: false

      - name: Test
        run: go test ./... -count=1

      - name: Build dynamic library
        shell: bash
        env:
          CGO_ENABLED: "1"
        run: |
          # Native runner per OS; do not cross-compile with CGO.
          go build \
            -buildvcs=false \
            -buildmode=c-shared \
            -o "grok-inspection.${{ matrix.ext }}" \
            .

      - name: Verify target platform
        shell: bash
        run: |
          go version -m "grok-inspection.${{ matrix.ext }}" | tee build-info.txt
          grep -q "GOOS=${{ matrix.goos }}" build-info.txt
          grep -q "GOARCH=${{ matrix.goarch }}" build-info.txt

      - name: Pack archive
        id: package
        shell: pwsh
        run: |
          $asset = "grok-inspection_${{ steps.release.outputs.version }}_${{ matrix.goos }}_${{ matrix.goarch }}.zip"
          Compress-Archive -Path "grok-inspection.${{ matrix.ext }}" -DestinationPath $asset -Force
          "asset=$asset" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.package.outputs.asset }}
          path: ${{ steps.package.outputs.asset }}
          if-no-files-found: error

  release:
    name: Publish release assets
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${INPUT_TAG}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Checkout release notes
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Resolve release notes
        id: notes
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          notes_file=".github/release-notes/${RELEASE_TAG}.md"
          if [[ ! -s "${notes_file}" ]]; then
            echo "missing release notes: ${notes_file}" >&2
            exit 1
          fi
          echo "file=${notes_file}" >> "$GITHUB_OUTPUT"

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: assets
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd assets
          sha256sum *.zip > checksums.txt
          cat checksums.txt

      - name: Upload assets to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          GH_REPO: ${{ github.repository }}
          RELEASE_NOTES_FILE: ${{ steps.notes.outputs.file }}
        run: |
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --title "Grok Inspection ${RELEASE_TAG}" \
              --notes-file "${RELEASE_NOTES_FILE}"
            gh release upload "${RELEASE_TAG}" assets/*.zip assets/checksums.txt --clobber
          else
            gh release create "${RELEASE_TAG}" \
              --title "Grok Inspection ${RELEASE_TAG}" \
              --notes-file "${RELEASE_NOTES_FILE}" \
              assets/*.zip \
              assets/checksums.txt
          fi
