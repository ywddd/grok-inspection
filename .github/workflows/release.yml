name: Release Plugin

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release-linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21.x"
          cache: false
      - name: Test
        run: go test ./... -count=1
      - name: Build package
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          mkdir -p release
          CGO_ENABLED=1 go build \
            -buildvcs=false \
            -buildmode=c-shared \
            -o release/grok-inspection.so \
            .
          (
            cd release
            zip -j "grok-inspection_${version}_linux_amd64.zip" grok-inspection.so
            sha256sum "grok-inspection_${version}_linux_amd64.zip" > checksums.txt
          )
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "Grok Inspection $GITHUB_REF_NAME" \
            --generate-notes \
            release/grok-inspection_*.zip \
            release/checksums.txt
